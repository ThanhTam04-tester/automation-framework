<!DOCTYPE html>
<html>
<head>
  <title>User Management</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .user-list li {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .user-list li:last-child {
      border-bottom: none;
    }

    .user-name {
      font-weight: bold;
    }

    .user-job {
      color: gray;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      width: 100%;
      background: #28a745;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #218838;
    }
  </style>
</head>

<body>
<div class="container">

  <!-- Create User -->
  <div class="card">
    <h2>Create User</h2>
    <form method="post">
      <input name="name" placeholder="Name (e.g Tam)" required>
      <input name="job" placeholder="Job (e.g Tester)" required>
      <button type="submit">Create User</button>
    </form>
  </div>

  <!-- User List -->
  <div class="card">
    <h2>User List</h2>
    <ul class="user-list">
      {% for user in users %}
        <li>
          <div class="user-name">{{ user.name }}</div>
          <div class="user-job">{{ user.job }}</div>
        </li>
      {% endfor %}
    </ul>
  </div>

</div>
</body>
</html>
